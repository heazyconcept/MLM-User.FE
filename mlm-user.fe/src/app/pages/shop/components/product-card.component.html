<div 
  (click)="onProductClick()"
  class="bg-white rounded-xl border border-gray-100 overflow-hidden cursor-pointer flex flex-col">

  <!-- Image — square, compact -->
  <div class="relative w-full aspect-square overflow-hidden bg-mlm-warm-50">
    <img 
      [src]="product.images[0]" 
      [alt]="product.name"
      class="w-full h-full object-cover"
      loading="lazy">

    <!-- Out of Stock -->
    @if (!product.inStock) {
      <div class="absolute inset-0 bg-white/75 backdrop-blur-sm flex items-center justify-center">
        <span class="px-3 py-1.5 bg-mlm-text/80 text-white text-xs font-semibold rounded-full tracking-wide">
          Out of Stock
        </span>
      </div>
    }

    <!-- PV pill — bottom-right of image -->
    <span class="absolute bottom-3 right-3 px-2.5 py-1 bg-white/90 text-mlm-primary text-xs font-bold rounded-lg border border-mlm-primary/20">
      {{ product.pv }} PV
    </span>
  </div>

  <!-- Info -->
  <div class="flex flex-col flex-1 p-4 gap-3">

    <!-- Category + Rating -->
    <div class="flex items-center justify-between">
      <span class="text-[11px] font-semibold uppercase tracking-widest text-mlm-secondary">
        {{ getCategoryLabel() }}
      </span>
      <div class="flex items-center gap-1">
        <span class="text-amber-400 text-xs leading-none">★</span>
        <span class="text-xs font-semibold text-mlm-secondary">{{ getRating() }}</span>
      </div>
    </div>

    <!-- Name -->
    <h3 class="text-sm font-bold text-mlm-text leading-snug line-clamp-2">
      {{ product.name }}
    </h3>

    <!-- Divider -->
    <div class="h-px bg-gray-100"></div>

    <!-- Price + Buy -->
    <div class="flex items-center justify-between gap-2">
      <span class="text-base font-extrabold text-mlm-text">
        {{ formatCurrency(product.memberPriceNGN) }}
      </span>
      <button
        type="button"
        (click)="onBuyClick($event)"
        [disabled]="!product.inStock"
        class="px-4 py-2 bg-mlm-primary text-white text-xs font-bold rounded-lg disabled:opacity-40 disabled:cursor-not-allowed tracking-wide">
        Buy Now
      </button>
    </div>
  </div>
</div>
