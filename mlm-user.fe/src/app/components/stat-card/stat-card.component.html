    <div [class]="'relative overflow-hidden rounded-2xl p-6 text-white shadow-lg h-full ' + bgClass">
      <div class="flex flex-col justify-between h-full">
        <div>
          <span class="text-xs font-semibold tracking-wide opacity-90">{{ label }}</span>
          <div class="flex flex-col mt-2">
            <span class="text-3xl font-bold">{{ value }}</span>
            @if (subValue) {
              <span class="text-base font-medium opacity-80 mt-1">{{ subValue }}</span>
            }
          </div>
        </div>
        @if (trend) {
          <div class="mt-3 flex items-center gap-1 text-xs font-semibold">
            <i [class]="'pi ' + trendIcon"></i>
            <span>{{ trend }}</span>
          </div>
        }
      </div>
    </div>
