<!-- Search & Sort -->
<div class="flex flex-col sm:flex-row gap-3 mb-6">
  <div class="w-full sm:w-1/2 relative">
    <i class="pi pi-search absolute left-3 top-1/2 -translate-y-1/2 text-mlm-secondary text-sm"></i>
    <input
      type="text"
      [value]="searchQuery"
      (input)="onSearchInput($event)"
      placeholder="Search"
      class="w-full pl-9 pr-4 py-2.5 bg-white border border-mlm-secondary/20 rounded-lg text-sm text-mlm-text placeholder:text-mlm-secondary focus:outline-none focus:ring-2 focus:ring-mlm-primary/20 focus:border-mlm-primary/30">
  </div>
  <select
    [value]="sortOption"
    (change)="onSortChange($event)"
    class="sm:w-48 px-4 py-2.5 bg-white border border-mlm-secondary/20 rounded-lg text-sm text-mlm-text focus:outline-none focus:ring-2 focus:ring-mlm-primary/20 focus:border-mlm-primary/30 cursor-pointer">
    @for (option of sortOptions; track option.value) {
      <option [value]="option.value">{{ option.label }}</option>
    }
  </select>
</div>

<!-- Category Pills -->
<div class="mb-6 overflow-x-auto scrollbar-hide" #categoryFilters tabindex="-1">
  <div class="flex gap-2 pb-2">
    @for (category of categories; track category.id) {
      <button
        type="button"
        (click)="onCategorySelect(category.id)"
        [class]="selectedCategory === category.id
          ? 'bg-mlm-primary text-white shadow-sm shadow-mlm-primary/20'
          : 'bg-white text-mlm-text border border-gray-200 hover:border-mlm-primary/40 hover:bg-mlm-primary/5'"
        class="px-5 py-2.5 rounded-full text-sm font-semibold whitespace-nowrap transition-all duration-200 flex items-center gap-2">
        <i [class]="'pi ' + category.icon + ' text-xs'"></i>
        {{ category.name }}
      </button>
    }
  </div>
</div>
