<p-table
  [value]="value"
  [paginator]="paginator"
  [rows]="rows"
  [rowsPerPageOptions]="rowsPerPageOptions"
  [loading]="loading"
  [responsiveLayout]="responsiveLayout"
  [breakpoint]="breakpoint"
  [rowHover]="rowHover"
  [tableStyle]="resolvedTableStyle()"
  styleClass="ui-clean-table"
>
  <!-- HEADER -->
  <ng-template pTemplate="header">
    <tr>
      @for (h of headers; track $index) {
        <th [class.text-right]="$index >= headers.length - 2">
          {{ h }}
        </th>
      }
    </tr>
  </ng-template>

  <!-- BODY -->
  <ng-template pTemplate="body" let-row>
    <ng-container [ngTemplateOutlet]="rowTemplate" [ngTemplateOutletContext]="{ $implicit: row }">
    </ng-container>
  </ng-template>

  <!-- EMPTY -->
  <ng-template pTemplate="emptymessage">
    @if (emptyTemplate) {
      <ng-container [ngTemplateOutlet]="emptyTemplate"></ng-container>
    } @else {
      <tr>
        <td [attr.colspan]="headers.length" class="py-16 text-center text-gray-500">
          No records found.
        </td>
      </tr>
    }
  </ng-template>
</p-table>
