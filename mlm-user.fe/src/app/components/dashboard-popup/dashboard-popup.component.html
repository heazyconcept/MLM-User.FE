<p-dialog
  [visible]="isOpen()"
  [modal]="true"
  [closable]="false"
  [dismissableMask]="false"
  [style]="{ width: 'min(92vw, 640px)' }"
  [contentStyle]="{ overflow: 'hidden' }"
  [baseZIndex]="12000"
>
  <div class="flex flex-col gap-4">
    <div class="flex items-start justify-between gap-3">
      <div>
        <p class="text-xs font-semibold uppercase tracking-wide text-mlm-primary">Announcement</p>
        <h2 class="text-xl font-extrabold text-slate-900">{{ popup()?.title }}</h2>
      </div>
      <button
        type="button"
        class="flex h-8 w-8 items-center justify-center rounded-full text-slate-500 hover:bg-slate-100 hover:text-slate-700"
        (click)="close()"
        aria-label="Dismiss announcement"
      >
        <i class="pi pi-times text-sm"></i>
      </button>
    </div>

    @if (hasImages()) {
      <div class="relative overflow-hidden rounded-2xl border border-slate-200 bg-slate-50">
        <img
          [src]="imageUrls()[imageIndex()]"
          alt="Announcement image"
          class="h-48 w-full object-cover"
        />

        @if (hasMultipleImages()) {
          <button
            type="button"
            class="absolute left-3 top-1/2 -translate-y-1/2 rounded-full bg-white/90 p-2 text-slate-700 shadow hover:bg-white"
            (click)="prevImage()"
            aria-label="Previous image"
          >
            <i class="pi pi-chevron-left"></i>
          </button>
          <button
            type="button"
            class="absolute right-3 top-1/2 -translate-y-1/2 rounded-full bg-white/90 p-2 text-slate-700 shadow hover:bg-white"
            (click)="nextImage()"
            aria-label="Next image"
          >
            <i class="pi pi-chevron-right"></i>
          </button>

          <div class="absolute bottom-3 left-1/2 flex -translate-x-1/2 gap-2">
            @for (dot of imageUrls(); track trackByIndex($index)) {
              <span
                class="h-2 w-2 rounded-full"
                [class.bg-slate-900]="$index === imageIndex()"
                [class.bg-slate-300]="$index !== imageIndex()"
              ></span>
            }
          </div>
        }
      </div>
    }

    <p class="text-base leading-7 text-slate-600">{{ popup()?.message }}</p>

    <div class="flex justify-end">
      <button
        type="button"
        class="rounded-lg bg-slate-900 px-4 py-2 text-sm font-semibold text-white hover:bg-slate-800"
        (click)="close()"
      >
        Got it
      </button>
    </div>
  </div>
</p-dialog>
