<div class="flex min-h-screen bg-white items-center justify-center px-6">
  <div class="w-full max-w-md">
    @if (usdtPayment(); as payment) {
      <app-usdt-deposit
        [payment]="payment"
        title="Complete your registration payment"
        (verified)="onUsdtVerified()"
        (back)="onRestartPayment()">
      </app-usdt-deposit>
    } @else if (missingSession()) {
      <div class="text-center">
        <p class="text-red-600 text-sm mb-6">
          Missing payment details. Please restart the payment flow.
        </p>
        <p-button
          label="Restart payment"
          icon="pi pi-refresh"
          (onClick)="onRestartPayment()"
          [loading]="isRestarting()">
        </p-button>
      </div>
    } @else {
      <div class="text-center py-8">
        <i class="pi pi-spin pi-spinner text-3xl text-mlm-primary"></i>
      </div>
    }
    <p class="mt-6 text-center">
      <a routerLink="/dashboard" class="text-slate-500 text-sm hover:text-mlm-primary">
        Skip for now — return to dashboard
      </a>
    </p>
  </div>
</div>
