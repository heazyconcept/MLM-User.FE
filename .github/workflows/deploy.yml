name: Deploy to cPanel

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mlm-user.fe/package-lock.json

      - name: Install dependencies
        working-directory: ./mlm-user.fe
        run: npm ci

      - name: Build application
        working-directory: ./mlm-user.fe
        run: npm run build
        env:
          CI: true

      - name: Deploy to cPanel via FTP
        env:
          FTP_HOST: ${{ secrets.CPANEL_HOST }}
          FTP_USER: ${{ secrets.CPANEL_USERNAME }}
          FTP_PASS: ${{ secrets.CPANEL_PASSWORD }}
          FTP_TARGET: ${{ secrets.CPANEL_TARGET_DIR }}
        run: |
          apt-get update && apt-get install -y lftp
          lftp -c "
            open ftp://$FTP_USER:$FTP_PASS@$FTP_HOST:21
            set ftp:ssl-allow no
            mkdir -p $FTP_TARGET
            cd $FTP_TARGET
            mirror -R --reverse mlm-user.fe/dist/mlm-user.fe/ ./
            bye
          "
