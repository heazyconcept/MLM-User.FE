name: Deploy to cPanel

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mlm-user.fe/package-lock.json

      - name: Install dependencies
        working-directory: ./mlm-user.fe
        run: npm ci

      - name: Build application
        working-directory: ./mlm-user.fe
        run: npm run build
        env:
          CI: true

      - name: Deploy to cPanel via FTP
        uses: SamDecrock/github-action-ftp-uploader@main
        with:
          host: ${{ secrets.CPANEL_HOST }}
          user: ${{ secrets.CPANEL_USERNAME }}
          password: ${{ secrets.CPANEL_PASSWORD }}
          local_dir: mlm-user.fe/dist/mlm-user.fe
          remote_dir: ${{ secrets.CPANEL_TARGET_DIR }}
